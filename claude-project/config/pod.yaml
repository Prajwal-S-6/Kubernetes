apiVersion: v1
kind: Pod
metadata:
  name: config-pod-file
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - mountPath: /etc/nginx/conf.d/default.conf
          name: conf
          subPath: default.conf
  volumes:
    - name: conf
      configMap:
        name: fileconfig
        items:
          - key: default.conf
            path: default.conf
