apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orders-api-rb
  namespace: ecommerce-dev
  labels:
    env: dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orders-api-config-reader
subjects:
  - kind: ServiceAccount
    name: orders-api-sa
    namespace: ecommerce-dev