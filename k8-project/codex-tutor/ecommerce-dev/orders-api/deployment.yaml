apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: ecommerce-dev
  labels:
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
      tier: backend
  template:
    metadata:
      labels:
        app: orders-api
        tier: backend
    spec:
      containers:
        - name: orders
          image: mycorp/orders-api:1.0.0
          ports:
            - name: orders-port
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: orders-api-config
            - secretRef:
                name: orders-api-secret
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              port: 8080
              path: /ready
            failureThreshold: 10
            periodSeconds: 10
          livenessProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 10
            httpGet:
              port: 8080
              path: /live
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30


