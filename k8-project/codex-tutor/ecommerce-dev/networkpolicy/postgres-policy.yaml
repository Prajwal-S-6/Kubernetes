apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-np
  namespace: ecommerce-dev
  labels:
    env: dev
spec:
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      app: postgres
  ingress:
    - ports:
        - port: 5432
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: orders-api
