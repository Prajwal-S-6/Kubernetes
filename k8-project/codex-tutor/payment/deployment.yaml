apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          image: mycorp/payment-api:2.4.1
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: container-port
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              port: 80
              path: /ready
            terminationGracePeriodSeconds: 30
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              port: 80
              path: /live
            terminationGracePeriodSeconds: 30
          envFrom:
            - secretRef:
                name: payment-secret
            - configMapRef:
                name: payment-config

