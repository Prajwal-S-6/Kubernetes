apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-leader
  labels:
    app: redis
    role: leader
spec:
  selector:
    matchLabels:
      app: redis
      role: leader
      tier: cache
  template:
    metadata:
      labels:
        app: redis
        role: leader
        tier: cache
    spec:
      containers:
        - name: redis
          image: registry.k8s.io/redis@sha256:cb111d1bd870a6a471385a4a69ad17469d326e9dd91e0e455350cacf36e1b3ee
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 100Mi


