apiVersion: v1
kind: Service
metadata:
  name: webapp-internal
spec:
  type: ClusterIP
  selector:
    app: webapp
    tier: frontend
  ports:
    - port: 8080
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: webapp-external
spec:
  type: NodePort
  selector:
    app: webapp
    tier: frontend
  ports:
    - port: 8080
      targetPort: 80
      nodePort: 30080