apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-role
  namespace: staging
rules:
  - verbs:
      - create
      - update
      - delete
    resources:
      - deployments
    apiGroups:
      - "apps"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: staging-prod-role
rules:
  - verbs:
      - get
      - list
    resources:
      - pods
    apiGroups:
      - ""
